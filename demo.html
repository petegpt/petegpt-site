<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐼 Panda Bamboo Catch</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      color: white;
      overflow: hidden;
    }
    h1 { font-size: 1.5rem; margin-bottom: 10px; color: #00ff99; }
    #game-area {
      position: relative;
      width: 400px;
      height: 500px;
      background: #16213e;
      border: 2px solid #00ff99;
      border-radius: 12px;
      overflow: hidden;
    }
    #panda { position: absolute; bottom: 10px; font-size: 2.5rem; user-select: none; }
    .bamboo { position: absolute; font-size: 1.8rem; user-select: none; }
    #scoreboard { display: flex; gap: 30px; margin-top: 10px; font-size: 1rem; }
    #score { color: #00ff99; }
    #lives { color: #ff6b6b; }
    #message { margin-top: 15px; font-size: 1.2rem; color: #ffd700; height: 1.5rem; }
    button {
      margin-top: 12px; padding: 8px 24px;
      background: #00ff99; color: #0f0f0f;
      border: none; border-radius: 6px;
      font-family: monospace; font-size: 1rem; cursor: pointer;
    }
    button:hover { background: #00cc77; }
  </style>
</head>
<body>
  <h1>🐼 Panda Bamboo Catch</h1>
  <div id="game-area">
    <div id="panda">🐼</div>
  </div>
  <div id="scoreboard">
    <span id="score">🎋 Score: 0</span>
    <span id="lives">❤️ Lives: 3</span>
  </div>
  <div id="message">Use arrow keys to move!</div>
  <button id="startBtn">Start Game</button>
  <script>
    const gameArea = document.getElementById('game-area');
    const panda = document.getElementById('panda');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const messageEl = document.getElementById('message');
    const startBtn = document.getElementById('startBtn');
    const GAME_WIDTH = 400, PANDA_WIDTH = 40;
    let pandaX = GAME_WIDTH/2 - PANDA_WIDTH/2;
    let score=0, lives=3, bamboos=[], spawnInterval, gameLoop, keys={};
    function setPandaPos(){ panda.style.left = pandaX+'px'; }
    function spawnBamboo(){
      const el = document.createElement('div');
      el.classList.add('bamboo'); el.textContent='🎋';
      const x = Math.random()*(GAME_WIDTH-30);
      el.style.left=x+'px'; el.style.top='0px';
      gameArea.appendChild(el);
      bamboos.push({el,x,y:0,speed:2+Math.random()*2+score*0.05});
    }
    function update(){
      if(keys['ArrowLeft']) pandaX=Math.max(0,pandaX-8);
      if(keys['ArrowRight']) pandaX=Math.min(GAME_WIDTH-PANDA_WIDTH,pandaX+8);
      setPandaPos();
      bamboos=bamboos.filter(b=>{
        b.y+=b.speed; b.el.style.top=b.y+'px';
        const caught=b.y+30>=460 && b.x>pandaX-20 && b.x<pandaX+PANDA_WIDTH+10;
        const missed=b.y>500;
        if(caught){score++;scoreEl.textContent='🎋 Score: '+score;b.el.remove();return false;}
        if(missed){lives--;livesEl.textContent='❤️ Lives: '+lives;b.el.remove();if(lives<=0)endGame();return false;}
        return true;
      });
    }
    function startGame(){
      score=0;lives=3;bamboos=[];pandaX=GAME_WIDTH/2-PANDA_WIDTH/2;
      scoreEl.textContent='🎋 Score: 0';livesEl.textContent='❤️ Lives: 3';
      messageEl.textContent='Use arrow keys to move!';
      gameArea.querySelectorAll('.bamboo').forEach(e=>e.remove());
      startBtn.textContent='Restart'; setPandaPos();
      clearInterval(spawnInterval);clearInterval(gameLoop);
      spawnInterval=setInterval(spawnBamboo,900);
      gameLoop=setInterval(update,16);
    }
    function endGame(){
      clearInterval(spawnInterval);clearInterval(gameLoop);
      messageEl.textContent='Game Over! Score: '+score+' 🎋';
    }
    document.addEventListener('keydown',e=>{keys[e.key]=true;});
    document.addEventListener('keyup',e=>{keys[e.key]=false;});
    startBtn.addEventListener('click',startGame);
    setPandaPos();
  </script>
</body>
</html>
