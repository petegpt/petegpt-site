<!DOCTYPE html>
<html lang="en">
<head>
<!-- Google tag (gtag.js) -->

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Grocery Shock</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;background:#fafaf8;color:#141412;padding:20px;-webkit-font-smoothing:antialiased}
.wrap{max-width:820px;margin:0 auto}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#e53935;margin-bottom:4px}
h1{font-size:clamp(20px,3.5vw,32px);font-weight:700;letter-spacing:-0.03em;color:#141412;margin-bottom:12px}
.picker{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.pill{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:30px;border:1.5px solid #e0e0da;background:#fff;font-size:12px;font-weight:500;color:#585852;cursor:pointer;transition:all .15s}
.pill:hover{border-color:#141412;color:#141412}
.pill.active{background:#141412;color:#fff;border-color:#141412}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.stat{background:#fff;border:1px solid #e0e0da;border-radius:8px;padding:10px 12px}
.slbl{font-size:10px;color:#9a9a94;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:3px}
.sval{font-size:clamp(16px,2.2vw,22px);font-weight:700;letter-spacing:-0.03em;color:#141412}
.sval.red{color:#e53935}
.ssub{font-size:10px;color:#9a9a94;margin-top:1px}
.chart-box{background:#fff;border:1px solid #e0e0da;border-radius:10px;padding:14px;margin-bottom:12px}
.ctitle{font-size:12px;font-weight:600;color:#141412;margin-bottom:2px}
.csub{font-size:11px;color:#9a9a94;margin-bottom:12px}
.chart-container{position:relative;height:200px;width:100%}
.slider-row{display:flex;justify-content:space-between;font-size:11px;color:#9a9a94;margin-bottom:4px}
.slider-row span:last-child{font-weight:600;color:#141412}
input[type=range]{width:100%;accent-color:#141412;margin-bottom:12px}
.bottom{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.insight{background:#fff8f8;border:1.5px solid #ffcdd2;border-radius:8px;padding:12px;display:flex;gap:8px}
.ii{font-size:18px;flex-shrink:0;line-height:1.4}
.it{font-size:12px;color:#585852;line-height:1.6}
.it strong{color:#141412}
.compare{background:#f4f4f1;border-radius:8px;padding:12px}
.compare h3{font-size:11px;font-weight:700;color:#141412;margin-bottom:8px}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.ci{background:#fff;border-radius:6px;padding:10px;text-align:center;border:1px solid #e0e0da}
.cy{font-size:10px;color:#9a9a94;font-weight:600;text-transform:uppercase;margin-bottom:2px}
.cp{font-size:clamp(18px,2.5vw,26px);font-weight:700;letter-spacing:-0.03em}
.cu{font-size:10px;color:#9a9a94}
.ca{font-size:11px;font-weight:600;color:#e53935;text-align:center}
.fn{font-size:10px;color:#9a9a94;margin-top:10px;line-height:1.6}
@media(max-width:540px){.stats{grid-template-columns:repeat(2,1fr)}.bottom{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Data Story · US Grocery Prices</div>
  <h1>The Grocery Shock</h1>
  <div class="picker" id="picker"></div>
  <div class="stats" id="stats"></div>
  <div class="chart-box">
    <div class="ctitle" id="ctitle"></div>
    <div class="csub">Average US retail price · move slider to explore</div>
    <div class="chart-container"><canvas id="chart"></canvas></div>
  </div>
  <div class="slider-row"><span>Explore by year</span><span id="slYr">2026</span></div>
  <input type="range" id="sl" min="0" max="26" value="26" oninput="onSl()">
  <div class="bottom">
    <div class="insight"><div class="ii" id="ii"></div><div class="it" id="it"></div></div>
    <div class="compare">
      <h3>Then vs Now</h3>
      <div class="cg" id="cg"></div>
      <div class="ca" id="ca"></div>
    </div>
  </div>
  <div class="fn">Data: US Bureau of Labor Statistics CPI & USDA retail price reports · Built by Peter · petegpt.ai</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
const ITEMS=[
  {id:'eggs',l:'Eggs',e:'🥚',u:'dozen',c:'#f59e0b',
   d:[0.96,0.97,1.03,1.08,1.16,1.23,1.31,1.68,1.93,1.68,1.54,1.85,1.79,1.93,2.94,2.75,1.32,1.34,1.35,1.40,1.48,1.79,2.51,3.38,4.82,6.23,5.90],
   ins:'Egg prices hit records in 2024-2025 due to a historic bird flu outbreak that wiped out nearly 100 million hens.',
   wow:'In 2025, eggs cost <strong>nearly 5× more</strong> than in 2016 — the last truly cheap year for eggs.'},
  {id:'milk',l:'Milk',e:'🥛',u:'gallon',c:'#3b82f6',
   d:[2.78,2.89,2.76,2.76,2.90,3.22,3.01,3.56,3.69,3.15,3.31,3.45,3.57,3.53,3.69,3.41,3.22,3.23,2.90,3.11,3.46,3.56,4.02,3.87,3.91,4.05,4.12],
   ins:'Milk prices track feed costs and government dairy programs. The 2022 spike followed rising corn and soy prices.',
   wow:'A gallon of milk costs <strong>nearly 50% more</strong> today than in 2000 — one of the more stable grocery items.'},
  {id:'bread',l:'Bread',e:'🍞',u:'loaf',c:'#a16207',
   d:[1.00,1.01,1.02,1.06,1.12,1.13,1.19,1.28,1.42,1.37,1.37,1.52,1.58,1.61,1.66,1.65,1.31,1.38,1.40,1.40,1.55,1.66,2.01,2.14,2.19,2.28,2.34],
   ins:"Bread surged after Russia's 2022 invasion of Ukraine — together they supply ~30% of the world's wheat exports.",
   wow:'A loaf that cost <strong>$1.00 in 2000</strong> now costs $2.34 — more than double in just 26 years.'},
  {id:'coffee',l:'Coffee',e:'☕',u:'lb can',c:'#7c3aed',
   d:[3.00,2.65,2.46,2.71,3.10,3.24,3.36,3.53,3.53,3.36,4.18,5.48,5.28,4.96,4.80,4.24,3.97,3.96,4.23,4.07,3.82,4.60,6.31,6.49,6.77,7.12,7.45],
   ins:'Coffee is highly volatile — Brazilian droughts, shipping costs, and climate events swing prices dramatically.',
   wow:'Coffee has <strong>doubled since 2016</strong>. A $3.97 can then costs $7.45 today.'},
  {id:'chicken',l:'Chicken',e:'🍗',u:'lb',c:'#dc2626',
   d:[1.08,1.05,1.05,1.07,1.17,1.19,1.24,1.27,1.37,1.38,1.44,1.54,1.60,1.65,1.77,1.77,1.70,1.70,1.77,1.73,1.81,2.07,2.41,2.50,2.59,2.72,2.81],
   ins:'Post-pandemic labor shortages at processing plants, plus feed cost spikes and bird flu, drove chicken prices up.',
   wow:'Chicken has risen <strong>160% since 2000</strong> — still the most affordable protein, but not like it used to be.'},
  {id:'gas',l:'Gas',e:'⛽',u:'gallon',c:'#059669',
   d:[1.51,1.46,1.36,1.59,1.88,2.30,2.59,2.80,3.27,2.35,2.79,3.53,3.64,3.53,3.37,2.45,2.14,2.42,2.72,2.60,2.17,3.01,3.95,3.53,3.31,3.18,3.10],
   ins:"The 2022 spike came from Russia's invasion of Ukraine disrupting global energy. Prices have since moderated.",
   wow:'Gas has <strong>more than doubled since 2000</strong> — but the 2022 peak has come down as markets stabilized.'},
];
const YRS=Array.from({length:27},(_,i)=>2000+i);
let cur=ITEMS[0],chart=null,hlIdx=26;

function init(){
  const p=document.getElementById('picker');
  ITEMS.forEach(it=>{
    const el=document.createElement('div');
    el.className='pill'+(it.id===cur.id?' active':'');
    el.innerHTML=it.e+' '+it.l;el.id='p_'+it.id;
    el.onclick=()=>pick(it);p.appendChild(el);
  });
  render();
}

function pick(it){
  cur=it;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  document.getElementById('p_'+it.id).classList.add('active');
  hlIdx=26;document.getElementById('sl').value=26;
  document.getElementById('slYr').textContent='2026';
  render();
}

function onSl(){
  hlIdx=parseInt(document.getElementById('sl').value);
  document.getElementById('slYr').textContent=YRS[hlIdx];
  renderStats();renderInsight();renderCompare();updateHL();
}

function render(){renderStats();renderChart();renderInsight();renderCompare();}

function renderStats(){
  const it=cur,d=it.d,yr=YRS[hlIdx];
  const pct=((d[hlIdx]-d[0])/d[0]*100).toFixed(0);
  const mx=Math.max(...d),mxY=YRS[d.indexOf(mx)];
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="slbl">In 2000</div><div class="sval">$${d[0].toFixed(2)}</div><div class="ssub">per ${it.u}</div></div>
    <div class="stat"><div class="slbl">In ${yr}</div><div class="sval red">$${d[hlIdx].toFixed(2)}</div><div class="ssub">per ${it.u}</div></div>
    <div class="stat"><div class="slbl">Increase</div><div class="sval red">+${pct}%</div><div class="ssub">since 2000</div></div>
    <div class="stat"><div class="slbl">Peak</div><div class="sval">$${mx.toFixed(2)}</div><div class="ssub">in ${mxY}</div></div>`;
}

function renderChart(){
  document.getElementById('ctitle').textContent=cur.e+' '+cur.l+' price per '+cur.u+' — 2000 to 2026';
  if(chart)chart.destroy();
  const ctx=document.getElementById('chart').getContext('2d');
  const grad=ctx.createLinearGradient(0,0,0,200);
  grad.addColorStop(0,cur.c+'44');grad.addColorStop(1,cur.c+'05');
  chart=new Chart(ctx,{
    type:'line',
    data:{labels:YRS,datasets:[{data:cur.d,borderColor:cur.c,backgroundColor:grad,borderWidth:2.5,
      pointRadius:YRS.map((_,i)=>i===hlIdx?8:2.5),
      pointBackgroundColor:YRS.map((_,i)=>i===hlIdx?'#e53935':cur.c),
      fill:true,tension:0.35}]},
    options:{responsive:true,maintainAspectRatio:false,animation:{duration:500},
      plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(0,0,0,0.85)',
        callbacks:{title:c=>'Year: '+c[0].label,label:c=>`$${c.raw.toFixed(2)} per ${cur.u}`}}},
      scales:{x:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{size:9},color:'#9a9a94',maxTicksLimit:14}},
        y:{grid:{color:'rgba(0,0,0,0.06)'},ticks:{font:{size:9},color:'#9a9a94',callback:v=>'$'+v.toFixed(2)}}}}
  });
}

function updateHL(){
  if(!chart)return;
  chart.data.datasets[0].pointRadius=YRS.map((_,i)=>i===hlIdx?8:2.5);
  chart.data.datasets[0].pointBackgroundColor=YRS.map((_,i)=>i===hlIdx?'#e53935':cur.c);
  chart.update('none');
}

function renderInsight(){
  document.getElementById('ii').textContent=cur.e;
  document.getElementById('it').innerHTML=`<strong>${cur.l} · ${YRS[hlIdx]}: $${cur.d[hlIdx].toFixed(2)}</strong> per ${cur.u}. ${cur.ins}<br><br>${cur.wow}`;
}

function renderCompare(){
  const d=cur.d,yr=YRS[hlIdx],p0=d[0],p1=d[hlIdx];
  const pct=((p1-p0)/p0*100).toFixed(0);
  const eq=(100*p1/p0).toFixed(0);
  document.getElementById('cg').innerHTML=`
    <div class="ci"><div class="cy">2000</div><div class="cp" style="color:#2e7d32">$${p0.toFixed(2)}</div><div class="cu">per ${cur.u}</div></div>
    <div class="ci"><div class="cy">${yr}</div><div class="cp" style="color:${p1>p0?'#e53935':'#2e7d32'}">$${p1.toFixed(2)}</div><div class="cu">per ${cur.u}</div></div>`;
  document.getElementById('ca').innerHTML=`📈 <strong>+${pct}%</strong> · $100 of ${cur.l} in 2000 = <strong>$${eq}</strong> in ${yr}`;
}

init();
</script>
</body>
</html>
